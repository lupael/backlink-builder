name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA or tag to roll back to"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

jobs:
  rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Confirm rollback target
        run: |
          echo "Rolling back to: ${{ inputs.commit_sha }}"
          echo "Reason: ${{ inputs.reason }}"
          git log -1 --oneline

      - name: Build frontend at rollback target
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy rollback build
        run: |
          echo "Deploying rollback build to production…"
          # Add your deployment commands here

      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 Production Rollback: ${{ inputs.commit_sha }}`,
              body: `**Rolled back to**: ${{ inputs.commit_sha }}\n**Reason**: ${{ inputs.reason }}\n**Triggered by**: ${{ github.actor }}`,
              labels: ['rollback', 'production'],
            });
